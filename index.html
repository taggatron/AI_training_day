      );

    function toClock(totalSeconds) {
      const safe = Math.max(0, Math.floor(totalSeconds));
      const mins = Math.floor(safe / 60);
      const secs = safe % 60;
      return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }

    function SectionTimer({ label, minutes = 20 }) {
      const startingSeconds = Math.max(60, Math.floor(minutes * 60));
      const [running, setRunning] = useState(false);
      const [secondsLeft, setSecondsLeft] = useState(startingSeconds);

      useEffect(() => {
        if (!running) return;
        const id = window.setInterval(() => {
          setSecondsLeft((s) => {
            if (s <= 1) {
              setRunning(false);
              return 0;
            }
            return s - 1;
          });
        }, 1000);
        return () => window.clearInterval(id);
      }, [running]);

      return (
        <div className="rounded-xl border border-slate-200 bg-white/80 px-4 py-3 backdrop-blur-md">
          <div className="flex flex-wrap items-center justify-between gap-3">
            <div className="inline-flex items-center gap-2">
              <Clock3 className="w-4 h-4 text-fuchsia-700" />
              <span className="text-xs font-extrabold tracking-widest uppercase text-slate-700">{label || 'Section Timer'}</span>
            </div>
            <div className="text-lg font-extrabold text-slate-950 tabular-nums">{toClock(secondsLeft)}</div>
          </div>
          <div className="mt-3 flex items-center gap-2">
            <button
              type="button"
              onClick={() => setRunning((v) => !v)}
              className="inline-flex items-center justify-center px-3 py-2 rounded-lg bg-fuchsia-700 text-white text-xs font-extrabold tracking-widest uppercase hover:bg-fuchsia-800"
            >
              {running ? 'Pause' : 'Start'}
            </button>
            <button
              type="button"
              onClick={() => {
                setRunning(false);
                setSecondsLeft(startingSeconds);
              }}
              className="inline-flex items-center justify-center px-3 py-2 rounded-lg border border-slate-200 bg-white text-xs font-extrabold tracking-widest uppercase text-slate-800 hover:bg-slate-50"
            >
              Reset
            </button>
          </div>
        </div>
      );
    }

    function SlideFrame({ children, allowScroll = false, useLightGradient = true, textScaleOverride = null }) {
      const viewportRef = useRef(null);
      const contentRef = useRef(null);
      const [fitScale, setFitScale] = useState(1);
      const [typeScale, setTypeScale] = useState(
        Number.isFinite(Number(textScaleOverride)) ? Number(textScaleOverride) : 1
      );
      const fitScaleRef = useRef(1);
      const typeScaleRef = useRef(1);

      useEffect(() => {
        fitScaleRef.current = fitScale;
      }, [fitScale]);

      useEffect(() => {
        typeScaleRef.current = typeScale;
      }, [typeScale]);

      useEffect(() => {
        if (Number.isFinite(Number(textScaleOverride))) {
          const fixed = Math.max(0.78, Math.min(1.18, Number(textScaleOverride)));
          setTypeScale(fixed);
        }
      }, [textScaleOverride]);

      useEffect(() => {
        let rafId = null;

        const recalc = () => {
          const viewportEl = viewportRef.current;
          const contentEl = contentRef.current;
          if (!viewportEl || !contentEl) return;

          // Keep a small gutter so content does not touch slide edges.
          const navReserve = 18;
          const viewportRect = viewportEl.getBoundingClientRect();
          const availWidth = Math.max(1, viewportRect.width - 14);
          const availHeight = Math.max(1, viewportRect.height - navReserve);

          // Measure rendered dimensions and normalize by current scale so the next
          // scale calculation is based on true unscaled content size.
          const currentScale = Math.max(0.01, fitScaleRef.current || 1);
          const renderedRect = contentEl.getBoundingClientRect();
          const contentWidth = Math.max(renderedRect.width / currentScale, 1);
          const contentHeight = Math.max(renderedRect.height / currentScale, 1);

          const widthRatio = availWidth / contentWidth;
          const heightRatio = availHeight / contentHeight;

          // Timeline slide can scroll vertically, so fill width first.
          const candidate = allowScroll
            ? widthRatio
            : Math.min(widthRatio, heightRatio);

          const next = Math.max(0.62, Math.min(2.05, Number.isFinite(candidate) ? candidate : 1));

          let nextTypeScale = typeScaleRef.current;
          if (Number.isFinite(Number(textScaleOverride))) {
            nextTypeScale = Math.max(0.78, Math.min(1.18, Number(textScaleOverride)));
          } else {
            const occupancy = Math.min(
              (contentWidth * next) / availWidth,
              (contentHeight * next) / availHeight
            );

            let targetTypeScale = 1;
            if (occupancy < 0.8) targetTypeScale = 1.22;
            else if (occupancy < 0.88) targetTypeScale = 1.12;
            else if (occupancy < 0.94) targetTypeScale = 1.06;
            else if (occupancy > 1.03) targetTypeScale = 0.96;

            const blended = (typeScaleRef.current * 0.7) + (targetTypeScale * 0.3);
            nextTypeScale = Math.max(0.88, Math.min(1.28, blended));
          }

          setFitScale((prev) => (Math.abs(prev - next) > 0.01 ? next : prev));
          setTypeScale((prev) => (Math.abs(prev - nextTypeScale) > 0.01 ? nextTypeScale : prev));
        };

        const scheduleRecalc = () => {
          if (rafId) window.cancelAnimationFrame(rafId);
          rafId = window.requestAnimationFrame(recalc);
        };

        scheduleRecalc();
        window.addEventListener('resize', scheduleRecalc);

        const resizeObserver = typeof ResizeObserver !== 'undefined'
          ? new ResizeObserver(scheduleRecalc)
          : null;

        if (resizeObserver) {
          if (viewportRef.current) resizeObserver.observe(viewportRef.current);
          if (contentRef.current) resizeObserver.observe(contentRef.current);
        }

        const mediaNodes = contentRef.current
          ? Array.from(contentRef.current.querySelectorAll('img, video, iframe, canvas, svg'))
          : [];

        mediaNodes.forEach((node) => {
          node.addEventListener('load', scheduleRecalc);
          node.addEventListener('loadedmetadata', scheduleRecalc);
        });

        return () => {
          window.removeEventListener('resize', scheduleRecalc);
          if (rafId) window.cancelAnimationFrame(rafId);
          if (resizeObserver) resizeObserver.disconnect();
          mediaNodes.forEach((node) => {
            node.removeEventListener('load', scheduleRecalc);
            node.removeEventListener('loadedmetadata', scheduleRecalc);
          });
        };
      }, [children, allowScroll]);

      return (
        <section
          ref={viewportRef}
          style={{ '--deck-content-scale': fitScale, '--deck-type-scale': typeScale }}
          className={`deck-slide-viewport slide-enter relative z-10 w-full overflow-hidden ${useLightGradient ? 'deck-light-bg' : ''}`}
        >
          <div className={`h-full w-full ${allowScroll ? 'timeline-slide-host overflow-y-auto' : 'non-timeline-slide overflow-hidden'}`}>
            <div className="deck-fit-stage">
              <div ref={contentRef} className="deck-fit-content">
                {children}
              </div>
            </div>
          </div>
        </section>
      );
    }

    function AIVisionHandsUpPanel({ onCountsChange }) {
      const slides = [
        { id: 'ai-1', label: 'AI', title: 'Turing Tutor', src: './TuringTutor.png' },
        { id: 'ai-2', label: 'Not AI', title: 'Supermarket self checkout', src: './supermarketselfcheckout.png' },
        { id: 'ai-3', label: 'AI', title: 'Sales analytics dashboard', src: './salesdashboard.png' },
        { id: 'ai-4', label: 'Not AI', title: 'Phishing warning email', src: './Gmail-phishing-warning-banner.png' },
        { id: 'ai-5', label: 'AI', title: 'Streaming recommendations', src: './Netflixrecommendations.png' },
        { id: 'ai-6', label: 'Live AI', title: 'TensorFlow webcam joint mapping', type: 'webcam' }
      ];

      const [slideIndex, setSlideIndex] = useState(0);
      const [cameraOn, setCameraOn] = useState(false);
      const [showTrackingPanel, setShowTrackingPanel] = useState(false);
      const [loadingModel, setLoadingModel] = useState(false);
      const [visionError, setVisionError] = useState('');
      const [peopleCount, setPeopleCount] = useState(0);
      const [handsUpCount, setHandsUpCount] = useState(0);

      const videoRef = useRef(null);
      const canvasRef = useRef(null);
      const previewVideoRef = useRef(null);
      const previewCanvasRef = useRef(null);
      const detectorRef = useRef(null);
      const streamRef = useRef(null);
      const animationRef = useRef(null);
      const activeRef = useRef(false);
      const busyRef = useRef(false);

      const nextSlide = () => setSlideIndex((idx) => (idx + 1) % slides.length);
      const prevSlide = () => setSlideIndex((idx) => (idx - 1 + slides.length) % slides.length);

      // Keep this slideshow manual-only for classroom pacing.
      // Facilitators can move images when they are ready to poll.

      const loadScript = (src) => new Promise((resolve, reject) => {
        const existing = document.querySelector(`script[src="${src}"]`);
        if (existing) {
          if (existing.dataset.loaded === 'true') {
            resolve();
            return;
          }

          existing.addEventListener('load', () => resolve(), { once: true });
          existing.addEventListener('error', () => reject(new Error(`Failed to load ${src}`)), { once: true });
          return;
        }

        const script = document.createElement('script');
        script.src = src;
        script.async = true;
        script.onload = () => {
          script.dataset.loaded = 'true';
          resolve();
        };
        script.onerror = () => reject(new Error(`Failed to load ${src}`));
        document.head.appendChild(script);
      });

      const ensureVisionLibraries = async () => {
        if (window.tf && window.poseDetection) return;

        if (!window.__AI_VISION_LIBS_PROMISE__) {
          window.__AI_VISION_LIBS_PROMISE__ = (async () => {
            await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.18.0/dist/tf.min.js');
            await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js');
          })();
        }

        await window.__AI_VISION_LIBS_PROMISE__;

        if (!window.tf || !window.poseDetection) {
          throw new Error('TensorFlow or pose-detection failed to initialize');
        }
      };

      const attachStreamToVideo = async (videoEl, stream) => {
        if (!videoEl || !stream) return;
        if (videoEl.srcObject !== stream) {
          videoEl.srcObject = stream;
        }
        try {
          await videoEl.play();
        } catch {
          // Ignore autoplay race conditions; user interaction on camera button usually resolves this.
        }
      };

      const stopVisionSession = () => {
        activeRef.current = false;
        busyRef.current = false;

        if (animationRef.current) {
          window.cancelAnimationFrame(animationRef.current);
          animationRef.current = null;
        }

        if (streamRef.current) {
          streamRef.current.getTracks().forEach((track) => track.stop());
          streamRef.current = null;
        }

        if (videoRef.current) {
          videoRef.current.srcObject = null;
        }

        if (previewVideoRef.current) {
          previewVideoRef.current.srcObject = null;
        }

        const canvas = canvasRef.current;
        const ctx = canvas ? canvas.getContext('2d') : null;
        if (ctx && canvas) {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        const previewCanvas = previewCanvasRef.current;
        const previewCtx = previewCanvas ? previewCanvas.getContext('2d') : null;
        if (previewCtx && previewCanvas) {
          previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
        }

        setPeopleCount(0);
        setHandsUpCount(0);
      };

      useEffect(() => {
        return () => {
          stopVisionSession();
        };
      }, []);

      useEffect(() => {
        onCountsChange?.({ peopleCount, handsUpCount });
      }, [peopleCount, handsUpCount, onCountsChange]);

      const isHandsRaised = (pose) => {
        const kp = (name) => pose.keypoints?.find((point) => point.name === name || point.part === name);

        const leftShoulder = kp('left_shoulder');
        const rightShoulder = kp('right_shoulder');
        const leftElbow = kp('left_elbow');
        const rightElbow = kp('right_elbow');
        const leftWrist = kp('left_wrist');
        const rightWrist = kp('right_wrist');

        const conf = (point) => (point?.score ?? 0) > 0.25;

        const leftWristHigh = conf(leftShoulder) && conf(leftWrist)
          && leftWrist.y < (leftShoulder.y + 12);
        const leftElbowHigh = conf(leftShoulder) && conf(leftElbow)
          && leftElbow.y < (leftShoulder.y - 6);
        const leftUp = leftWristHigh || leftElbowHigh;

        const rightWristHigh = conf(rightShoulder) && conf(rightWrist)
          && rightWrist.y < (rightShoulder.y + 12);
        const rightElbowHigh = conf(rightShoulder) && conf(rightElbow)
          && rightElbow.y < (rightShoulder.y - 6);
        const rightUp = rightWristHigh || rightElbowHigh;

        return leftUp || rightUp;
      };

      const drawPoseOverlay = (poses, width, height, canvas) => {
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        if (!ctx) return;

        if (canvas.width !== width || canvas.height !== height) {
          canvas.width = width;
          canvas.height = height;
        }

        ctx.clearRect(0, 0, width, height);

        const links = [
          ['left_shoulder', 'left_elbow'],
          ['left_elbow', 'left_wrist'],
          ['right_shoulder', 'right_elbow'],
          ['right_elbow', 'right_wrist'],
          ['left_shoulder', 'right_shoulder']
        ];

        poses.forEach((pose) => {
          const points = pose.keypoints || [];
          const pointFor = (name) => points.find((point) => point.name === name || point.part === name);

          links.forEach(([a, b]) => {
            const pa = pointFor(a);
            const pb = pointFor(b);
            if (!pa || !pb || (pa.score ?? 0) < 0.35 || (pb.score ?? 0) < 0.35) return;

            ctx.strokeStyle = '#22c55e';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(pa.x, pa.y);
            ctx.lineTo(pb.x, pb.y);
            ctx.stroke();
          });

          points.forEach((point) => {
            if ((point.score ?? 0) < 0.35) return;
            ctx.fillStyle = '#0ea5e9';
            ctx.beginPath();
            ctx.arc(point.x, point.y, 4, 0, Math.PI * 2);
            ctx.fill();
          });
        });
      };

      const runPoseLoop = () => {
        const frame = async () => {
          if (!activeRef.current) return;
          animationRef.current = window.requestAnimationFrame(frame);

          if (busyRef.current) return;
          const video = videoRef.current || previewVideoRef.current;
          if (!video || video.readyState < 2 || !detectorRef.current) return;

          busyRef.current = true;
          try {
            const poses = await detectorRef.current.estimatePoses(video, {
              flipHorizontal: true,
              maxPoses: 8
            });

            const validPoses = poses.filter((pose) => Array.isArray(pose.keypoints));
            const raised = validPoses.filter((pose) => isHandsRaised(pose)).length;

            setPeopleCount(validPoses.length);
            setHandsUpCount(raised);

            const baseWidth = video.videoWidth || 640;
            const baseHeight = video.videoHeight || 360;

            if (canvasRef.current) {
              drawPoseOverlay(validPoses, baseWidth, baseHeight, canvasRef.current);
            }

            if (previewVideoRef.current?.videoWidth && previewVideoRef.current?.videoHeight) {
              drawPoseOverlay(
                validPoses,
                previewVideoRef.current.videoWidth,
                previewVideoRef.current.videoHeight,
                previewCanvasRef.current
              );
            } else {
              drawPoseOverlay(validPoses, baseWidth, baseHeight, previewCanvasRef.current);
            }
          } catch (error) {
            setVisionError(`Pose detection error: ${error?.message || 'unknown error'}`);
          } finally {
            busyRef.current = false;
          }
        };

        animationRef.current = window.requestAnimationFrame(frame);
      };

      const startVisionSession = async () => {
        setVisionError('');
        setLoadingModel(true);

        try {
          await ensureVisionLibraries();
          const tf = window.tf;
          const poseDetection = window.poseDetection;

          try {
            await tf.setBackend('webgl');
          } catch {
            await tf.setBackend('cpu');
          }
          await tf.ready();

          if (!detectorRef.current) {
            detectorRef.current = await poseDetection.createDetector(
              poseDetection.SupportedModels.MoveNet,
              {
                modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING,
                enableSmoothing: true
              }
            );
          }

          const stream = await navigator.mediaDevices.getUserMedia({
            audio: false,
            video: {
              width: { ideal: 960 },
              height: { ideal: 540 },
              facingMode: 'user'
            }
          });

          streamRef.current = stream;
          await attachStreamToVideo(videoRef.current, stream);
          await attachStreamToVideo(previewVideoRef.current, stream);

          activeRef.current = true;
          runPoseLoop();
        } catch (error) {
          stopVisionSession();
          setCameraOn(false);
          setVisionError(error?.message || 'Could not start camera + pose model');
        } finally {
          setLoadingModel(false);
        }
      };

      useEffect(() => {
        if (!cameraOn) {
          stopVisionSession();
          return;
        }

        startVisionSession();
      }, [cameraOn]);

      useEffect(() => {
        if (!cameraOn) return;
        if (!streamRef.current) return;
        if (slides[slideIndex]?.type !== 'webcam') return;
        attachStreamToVideo(previewVideoRef.current, streamRef.current);
      }, [slideIndex, cameraOn]);

      const handleCameraButton = () => {
        if (cameraOn) {
          setCameraOn(false);
          return;
        }
        setCameraOn(true);
      };

      const activeSlide = slides[slideIndex];

      return (
        <div className="ai-live-panel-fit mt-0 rounded-xl border border-slate-200 bg-slate-950 p-2 md:p-3 text-slate-100 flex-1 min-h-0 h-full flex flex-col w-full min-w-0 overflow-hidden">
          <video ref={videoRef} className="hidden" muted playsInline aria-hidden="true" />

          <div className="flex flex-wrap items-center justify-between gap-2 md:gap-3 min-w-0">
            <p className="text-[11px] font-extrabold tracking-widest uppercase text-cyan-300 min-w-0">AI or Not AI + Hands Up Detector</p>
            <div className="flex items-center gap-2 md:gap-3 max-w-full flex-wrap justify-end">
              <button
                type="button"
                onClick={() => setShowTrackingPanel((v) => !v)}
                className="px-3 py-2 rounded-lg border border-cyan-700 bg-cyan-950/40 text-cyan-200 text-[11px] md:text-xs font-extrabold tracking-widest uppercase hover:bg-cyan-900/60 whitespace-nowrap"
              >
                {showTrackingPanel ? 'Hide tracking panel' : 'Show tracking panel'}
              </button>
              <button
                type="button"
                onClick={handleCameraButton}
                disabled={loadingModel}
                className="px-3 py-2 rounded-lg bg-cyan-500 text-slate-950 text-[11px] md:text-xs font-extrabold tracking-widest uppercase hover:bg-cyan-400 disabled:opacity-60 whitespace-nowrap"
              >
                {cameraOn ? 'Stop camera' : (loadingModel ? 'Loading model...' : 'Start camera')}
              </button>
            </div>
          </div>

          <div className={`mt-2 grid grid-cols-1 ${showTrackingPanel ? 'xl:grid-cols-2' : ''} gap-2 md:gap-3 flex-1 min-h-0 w-full min-w-0`}>
            <div className="rounded-xl border border-slate-700 bg-slate-900/80 overflow-hidden flex flex-col min-h-0 w-full min-w-0">
              <div className="ai-live-media relative w-full bg-black flex-1 min-h-[120px] md:min-h-[150px] overflow-hidden">
                {activeSlide.type === 'webcam' ? (
                  <>
                    <video ref={previewVideoRef} className="h-full w-full object-contain" muted playsInline />
                    <canvas ref={previewCanvasRef} className="absolute inset-0 h-full w-full" />
                    {!cameraOn && (
                      <div className="absolute inset-0 grid place-items-center p-4 text-center bg-black/65">
                        <p className="text-sm font-semibold text-slate-200">Start camera to show live TensorFlow joint mapping on this slide.</p>
                      </div>
                    )}
                  </>
                ) : (
                  <img src={activeSlide.src} alt={activeSlide.title} className="h-full w-full object-contain" />
                )}

                <div className="absolute left-3 top-3 rounded-md bg-black/70 border border-white/20 px-3 py-1 text-xs font-extrabold tracking-widest uppercase">
                  {activeSlide.label}
                </div>

                <div className="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/75 to-transparent px-4 py-3">
                  <p className="text-sm font-extrabold text-white">{activeSlide.title}</p>
                </div>
              </div>

              <div className="p-3 flex items-center justify-between gap-3 border-t border-slate-700">
                <button
                  type="button"
                  onClick={prevSlide}
                  className="px-3 py-2 rounded-lg border border-slate-600 bg-slate-800 text-xs font-extrabold tracking-widest uppercase hover:bg-slate-700"
                >
                  Previous
                </button>
                <div className="text-xs font-extrabold tracking-widest uppercase text-slate-300">
                  {slideIndex + 1} / {slides.length}

                <button

                  onClick={nextSlide}
                  className="px-3 py-2 rounded-lg border border-slate-600 bg-slate-800 text-xs font-extrabold tracking-widest uppercase hover:bg-slate-700"
                >
                  Next
                </button>
              </div>
            </div>

            {showTrackingPanel && (
              <div className="rounded-xl border border-slate-700 bg-slate-900/80 p-3 flex flex-col min-h-0 w-full min-w-0 overflow-hidden">
                <div className="flex flex-wrap items-center justify-between gap-3">
                  <p className="text-[11px] font-extrabold tracking-widest uppercase text-slate-300">Camera joint tracking</p>
                </div>

                <div className="ai-live-media mt-2 rounded-lg overflow-hidden border border-slate-700 bg-black relative flex-1 min-h-[120px] md:min-h-[150px]">
                  <video ref={videoRef} className="h-full w-full object-contain" muted playsInline />
                  <canvas ref={canvasRef} className="absolute inset-0 h-full w-full" />
                  {!cameraOn && (
                    <div className="absolute inset-0 grid place-items-center p-4 text-center">
                      <p className="text-sm font-semibold text-slate-300">Enable camera to detect body joints and count raised hands in real-time.</p>
                    </div>
                  )}
                </div>

                {visionError && (
                  <p className="mt-3 text-sm font-semibold text-rose-300">{visionError}</p>
                )}

                <div className="mt-3 grid grid-cols-2 gap-3">
                  <div className="rounded-lg border border-slate-700 bg-slate-800/80 p-3 text-center">
                    <p className="text-[10px] font-extrabold tracking-widest uppercase text-slate-400">People detected</p>
                    <p className="text-2xl font-black text-white mt-1">{peopleCount}</p>

                  <div className="rounded-lg border border-cyan-700 bg-cyan-950/50 p-3 text-center">
                    <p className="text-[10px] font-extrabold tracking-widest uppercase text-cyan-300">Hands raised</p>
                    <p className="text-2xl font-black text-cyan-200 mt-1">{handsUpCount}</p>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );

    function JobImpactArrowSlider({
      value,
      onChange,
      readOnly = false,
      step = 5,
      showNextLabels = true,
      caption,
    }) {
      const containerRef = useRef(null);
      const pointerDownRef = useRef(false);
      const clampPercent = (n) => Math.max(0, Math.min(100, Math.round(Number(n) || 0)));
      const v = clampPercent(value);

      const base = 110;
      const maxExtra = 220;
      const offset = (v - 50) / 50; // -1..1
      const extra = Math.round(Math.abs(offset) * maxExtra);
      const leftWidth = offset < 0 ? base + extra : base;
      const rightWidth = offset > 0 ? base + extra : base;

      const leftNext = clampPercent(v - step);
      const rightNext = clampPercent(v + step);

      const setFromClientX = (clientX) => {
        if (readOnly) return;
        const el = containerRef.current;
        if (!el) return;
        const r = el.getBoundingClientRect();
        const x = Math.min(Math.max(clientX - r.left, 0), r.width);
        const center = r.width / 2;
        const o = (x - center) / center;
        const next = clampPercent(50 + (o * 50));
        onChange?.(next);
      };

      const shaftClass = "h-1 rounded-full bg-gradient-to-r from-fuchsia-600 via-amber-400 to-cyan-500";

      return (
        <div className="w-full">
          <div className="rounded-2xl border border-slate-200 bg-white/70 backdrop-blur-md px-5 py-4">
            <div className="flex items-center justify-between text-xs font-extrabold tracking-widest uppercase text-slate-700">
              <span className="text-rose-700">Job Destruction</span>
              <span className="text-emerald-700">Job Creation</span>
            </div>

            <div className="mt-3 flex items-center justify-center">
              <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-slate-950/10 border border-slate-200">
                <span className="text-[11px] font-extrabold tracking-widest uppercase text-slate-700">Current</span>
                <span className="text-sm font-extrabold text-slate-950 tabular-nums">{v}%</span>

          const ext = RESEARCH_FILE.split('.').pop()?.toLowerCase();
          if (ext === 'csv') {
            const csvText = await response.text();

            const rows = window.XLSX.utils.sheet_to_json(firstSheet, {

    function EmbeddingSpace3DGraph() {
      const plotRef = useRef(null);

      useEffect(() => {
        if (!plotRef.current || !window.Plotly) return;

        const points = [
          { word: 'dog', x: 0.82, y: 0.12, z: 0.24, cluster: 'animals' },
          { word: 'cat', x: 0.9, y: 0.18, z: 0.3, cluster: 'animals' },
          { word: 'king', x: 0.18, y: 0.94, z: 0.34, cluster: 'royalty' },
          { word: 'queen', x: 0.26, y: 0.97, z: 0.44, cluster: 'royalty' },
          { word: 'car', x: -0.76, y: 0.08, z: 0.86, cluster: 'transport' },
          { word: 'truck', x: -0.9, y: 0.12, z: 0.96, cluster: 'transport' },
          { word: 'vehicle', x: -0.84, y: 0.1, z: 0.72, cluster: 'transport' }
        ];

        const edges = [
          ['dog', 'cat'],
          ['king', 'queen'],
          ['car', 'truck'],
          ['car', 'vehicle'],
          ['truck', 'vehicle']
        ];

        const colorByCluster = {
          animals: '#10b981',
          royalty: '#6366f1',
          transport: '#f59e0b'
        };

        const getPoint = (word) => points.find((p) => p.word === word);

        const edgeTrace = {
          type: 'scatter3d',
          mode: 'lines',
          x: edges.flatMap(([a, b]) => [getPoint(a).x, getPoint(b).x, null]),
          y: edges.flatMap(([a, b]) => [getPoint(a).y, getPoint(b).y, null]),
          z: edges.flatMap(([a, b]) => [getPoint(a).z, getPoint(b).z, null]),
          line: { color: 'rgba(71,85,105,0.55)', width: 5 },
          hoverinfo: 'skip',
          showlegend: false
        };

        const nodeTrace = {
          type: 'scatter3d',
          mode: 'markers+text',
          x: points.map((p) => p.x),
          y: points.map((p) => p.y),
          z: points.map((p) => p.z),
          text: points.map((p) => p.word),
          textposition: 'top center',
          textfont: { size: 12, color: '#0f172a' },
          marker: {
            size: points.map((p) => (p.cluster === 'royalty' ? 8 : 7)),
            color: points.map((p) => colorByCluster[p.cluster]),
            opacity: 0.95,
            line: { width: 1, color: '#ffffff' }
          },
          hovertemplate: '%{text}<extra></extra>',
          showlegend: false
        };

        const axisVectors = {
          type: 'cone',
          x: [0, 0, 0],
          y: [0, 0, 0],
          z: [0, 0, 0],
          u: [1.05, 0.0, 0.0],
          v: [0.0, 1.05, 0.0],
          w: [0.0, 0.0, 1.05],
          colorscale: [
            [0, '#7dd3fc'],
            [0.5, '#a78bfa'],
            [1, '#f9a8d4']
          ],
          sizemode: 'absolute',
          sizeref: 0.23,
          opacity: 0.85,
          hoverinfo: 'skip',
          showscale: false,
          anchor: 'tail'
        };

        const axisLabelTrace = {
          type: 'scatter3d',
          mode: 'text',
          x: [1.18, 0.02, 0.02],
          y: [0.02, 1.18, 0.02],
          z: [0.02, 0.02, 1.18],
          text: ['Animality', 'Royalty', 'Mobility'],
          textfont: { size: 12, color: '#334155' },
          hoverinfo: 'skip',
          showlegend: false
        };

        const layout = {
          margin: { l: 0, r: 0, b: 0, t: 0 },
          paper_bgcolor: 'rgba(0,0,0,0)',
          plot_bgcolor: 'rgba(0,0,0,0)',
          scene: {
            camera: { eye: { x: 1.5, y: 1.2, z: 1.05 } },
            xaxis: {
              title: 'Animality',
              range: [-1.2, 1.2],
              gridcolor: 'rgba(148,163,184,0.2)',
              zerolinecolor: 'rgba(148,163,184,0.3)',
              backgroundcolor: 'rgba(255,255,255,0)'
            },
            yaxis: {
              title: 'Royalty',
              range: [-0.2, 1.2],
              gridcolor: 'rgba(148,163,184,0.2)',
              zerolinecolor: 'rgba(148,163,184,0.3)',
              backgroundcolor: 'rgba(255,255,255,0)'
            },
            zaxis: {
              title: 'Mobility',
              range: [-0.1, 1.2],
              gridcolor: 'rgba(148,163,184,0.2)',
              zerolinecolor: 'rgba(148,163,184,0.3)',
              backgroundcolor: 'rgba(255,255,255,0)'
            }
          }
        };

        window.Plotly.newPlot(plotRef.current, [edgeTrace, nodeTrace, axisVectors, axisLabelTrace], layout, {
          displayModeBar: false,
          responsive: true
        });

        let angle = 0;
        const timer = setInterval(() => {
          angle += 0.045;
          const pulse = 1 + (Math.sin(angle * 2.2) * 0.08);
          window.Plotly.update(
            plotRef.current,
            {
              u: [[1.05 * pulse, 0, 0]],
              v: [[0, 1.05 * pulse, 0]],
              w: [[0, 0, 1.05 * pulse]]
            },
            {
              'scene.camera.eye': {
                x: 1.45 + Math.cos(angle) * 0.2,
                y: 1.15 + Math.sin(angle) * 0.2,
                z: 1.0 + Math.sin(angle * 0.7) * 0.08
              }
            },
            [2]
          );
        }, 60);

        return () => {
          clearInterval(timer);
          if (plotRef.current) {
            window.Plotly.purge(plotRef.current);
          }
        };
      }, []);

      return (
        <div className="rounded-lg border border-violet-200 bg-violet-50/70 p-3 md:p-4 overflow-hidden">
          <div className="flex items-center justify-between gap-2">
            <p className="text-xs font-extrabold tracking-widest uppercase text-violet-700">Animated Embedding Space</p>
            <p className="text-[11px] font-semibold text-violet-700/80">3D vectors and axes show semantic direction</p>
          </div>
          <div className="mt-3 h-64 rounded-xl border border-violet-200 bg-gradient-to-br from-white via-violet-100/40 to-cyan-100/40">
            <div ref={plotRef} className="w-full h-full" />
          </div>
          <p className="mt-3 text-xs md:text-sm font-medium text-violet-900/90">
            Example clusters: <span className="font-extrabold">dog-cat</span>, <span className="font-extrabold">king-queen</span>, <span className="font-extrabold">car-truck</span>.
          </p>
        </div>
      );
    }

    function AIPresentation() {
      const slideDefs = [
        {
          key: 'title',
          render: () => <TitleSlide jobImpactBefore={jobImpactBefore} setJobImpactBefore={setJobImpactBefore} />
        },
        {
          key: 'learning-outcomes',
          render: () => <LearningOutcomesSlide />
        },
        {
          key: 'schedule',
          render: () => <ScheduleSlide />
        },
        {
          key: 'productivity-challenge',
          render: () => <ProductivityChallengeSlide />
        },
        {
          key: 'productivity-workflows-skill-check-followup',
          render: () => (
            <ProductivityWorkflowsSlide
              slideTitle="Prompt engineering 101"
              instructionTitle="Killer meta-prompt"
              instructionText="Ask AI LLMs to improve your prompt first, then run the improved prompt instead to generate stronger insights."
              subtitle="09:30-10:20 | Improve your prompt with a killer meta-prompt, then apply it."
              showWorkflowCards={false}
              tryItPrompt="Ask AI to improve your prompt first: 'Improve the following prompt so it will give me a better response: [your prompt here]' — then run the improved version."
            />  
          )
        },
        {
          key: 'short-break',
          render: () => <ShortBreakSlide />
        },
        {
          key: 'frontier-firms',
          render: () => <FrontierFirmsSlide />
        },
        {
          key: 'need-for-ai-innovation',
          render: () => <AIInnovationNeedSlide />
        },
        {
          key: 'optional-evidence-enrichment',
          render: () => <OptionalEvidenceEnrichmentSlide />
        },
        {
          key: 'model-comparison',
          render: () => <ModelComparisonSlide />
        },
        {
          key: 'productivity-workflows',
          render: () => (
            <ProductivityWorkflowsSlide
              showWorkflowCards={false}
              showDataTypeSummary={true}
              tryItPrompt="Take the Racecourse market research file and apply the Killer Thought prompt: 'How would an expert analyst extract actionable insights from this dataset?'"
              dataTypeSummaryItems={[
                { icon: 'FileText', label: 'Free-text fields', desc: 'Customer comments, competitor notes, and open feedback.' },
                { icon: 'Tag', label: 'Categorical text', desc: 'Segment labels, channel/source names, and location/group tags.' },
                { icon: 'BarChart3', label: 'Numeric values', desc: 'Spend, conversion rates, volume counts, and revenue-style metrics.' },
                { icon: 'Calendar', label: 'Date/time fields', desc: 'Period, campaign date, or event timing columns for trend analysis.' },
                { icon: 'Hash', label: 'Identifier fields', desc: 'IDs or reference codes you can use for grouping and filtering.' },
              ]}
            />
          )
        },
        {
          key: 'lunch-break',
          render: () => <LunchBreakSlide />
        },
        {
          key: 'ai-not-ai-live',
          render: () => <AINotAILiveSlide />
        },
        {
          key: 'optional-timeline-enrichment',
          render: () => <OptionalTimelineEnrichmentSlide />
        },
        {
          key: 'timeline-sorting',
          render: () => <TimelineSortingSlide />
        },
        {
          key: 'agents',
          render: () => <AgentsSlide />
        },
        {
          key: 'salon-sim',
          render: () => <FutureSlide />
        },
        {
          key: 'networking-support',
          render: () => <NetworkingSupportSlide />
        },
        {
          key: 'summary',
          render: () => <SummarySlide />
        }
      ];
      const total = slideDefs.length;

      const parseSlideFromHash = () => {
        try {
          const hash = String(window.location.hash || '').trim();
          if (!hash) return null;

          // Support both #slide-5 (human-friendly) and #5 (raw index)
          const slideMatch = hash.match(/^#slide-(\d+)$/i);
          if (slideMatch) {
            const oneBased = Number(slideMatch[1]);
            if (!Number.isFinite(oneBased)) return null;
            return oneBased - 1;
          }

          const rawMatch = hash.match(/^#(\d+)$/);
          if (rawMatch) {
            const rawIndex = Number(rawMatch[1]);
            if (!Number.isFinite(rawIndex)) return null;
            return rawIndex;
          }
        } catch {}
        return null;
      };

      const clampSlideIndex = (n) => {
        const parsed = Number.isFinite(Number(n)) ? Math.trunc(Number(n)) : 0;
        return Math.max(0, Math.min(total - 1, parsed));
      };

      const [slide, setSlide] = useState(() => {
        const fromHash = parseSlideFromHash();
        if (fromHash != null) {
          return clampSlideIndex(fromHash);
        }

        try {
          const raw = sessionStorage.getItem('aiDeckCurrentSlide');
          if (raw == null) return 0;
          return clampSlideIndex(raw);
        } catch {
          return 0;
        }
      });

      const clampPercent = (n) => {
        const v = Math.round(Number(n) || 0);
        return Math.max(0, Math.min(100, v));
      };

      const [jobImpactBefore, setJobImpactBefore] = useState(() => {
        try {
          const raw = localStorage.getItem('jobImpactBefore');
          return raw == null ? 50 : clampPercent(raw);
        } catch {
          return 50;
        }
      });

      const [jobImpactAfter, setJobImpactAfter] = useState(() => {
        try {
          const raw = localStorage.getItem('jobImpactAfter');
          return raw == null ? null : clampPercent(raw);
        } catch {
          return null;
        }
      });

      useEffect(() => {
        try { localStorage.setItem('jobImpactBefore', String(jobImpactBefore)); } catch {}
      }, [jobImpactBefore]);

      useEffect(() => {
        if (jobImpactAfter == null) return;
        try { localStorage.setItem('jobImpactAfter', String(jobImpactAfter)); } catch {}
      }, [jobImpactAfter]);

      useEffect(() => {
        try { sessionStorage.setItem('aiDeckCurrentSlide', String(slide)); } catch {}
      }, [slide]);

      useEffect(() => {
        const hash = `#slide-${slide + 1}`;
        if (window.location.hash === hash) return;
        try {
          window.history.replaceState(null, '', hash);
        } catch {
          window.location.hash = hash;
        }
      }, [slide]);

      useEffect(() => {
        const onHashChange = () => {
          const fromHash = parseSlideFromHash();
          if (fromHash == null) return;
          const next = clampSlideIndex(fromHash);
          setSlide((current) => (current === next ? current : next));
        };

        window.addEventListener('hashchange', onHashChange);
        return () => window.removeEventListener('hashchange', onHashChange);
      }, [total]);

      // Bridge values into SummarySlide without rewiring the whole deck structure.
      // (SummarySlide is rendered conditionally; this keeps it simple.)
      window.__JOB_IMPACT_BEFORE__ = jobImpactBefore;
      window.__JOB_IMPACT_AFTER__ = jobImpactAfter;
      window.__SET_JOB_IMPACT_AFTER__ = (n) => setJobImpactAfter(clampPercent(n));

      useEffect(() => {
        const onKeyDown = (e) => {
          if (e.defaultPrevented) return;
          if (e.metaKey || e.ctrlKey || e.altKey) return;

          const target = e.target;
          const tagName = target?.tagName ? target.tagName.toUpperCase() : '';
          const isEditable = target?.isContentEditable
            || tagName === 'INPUT'
            || tagName === 'TEXTAREA'
            || tagName === 'SELECT'
            || tagName === 'BUTTON';

          // Ignore deck hotkeys while interacting with controls.
          if (isEditable) return;

          if (e.key === 'p' || e.key === 'P') {
            document.body.classList.toggle('presentation-mode');
            return;
          }
          if (e.key === 'ArrowRight' || e.key === 'PageDown') setSlide((s) => Math.min(total - 1, s + 1));
          if (e.key === 'ArrowLeft' || e.key === 'PageUp') setSlide((s) => Math.max(0, s - 1));
        };
        window.addEventListener('keydown', onKeyDown);
        return () => window.removeEventListener('keydown', onKeyDown);
      }, [total]);

      const currentSlideDef = slideDefs[slide];
      const isTimelineSlide = currentSlideDef?.key === 'optional-timeline-enrichment';
      const isTimelineFamily = String(currentSlideDef?.key || '').includes('timeline');
      const timelineTextScale = isTimelineFamily ? 0.9 : null;

      return (
        <div className="bg-slate-950 text-slate-200 font-sans selection:bg-purple-500 selection:text-white">
          <DeckBackground />

          <div className="relative z-10">
            {currentSlideDef && (
              <SlideFrame key={slide} allowScroll={isTimelineSlide} useLightGradient={!isTimelineSlide} textScaleOverride={timelineTextScale}>
                {currentSlideDef.render()}
              </SlideFrame>
            )}
          </div>

          <DeckNav slide={slide} setSlide={setSlide} total={total} />
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<AIPresentation />);
  </script>
</body>
</html>
